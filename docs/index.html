<!DOCTYPE html>
<html>
<head>
<title>Concession Dashboard</title>
</head>

<body>

<h1>Inventory Dashboard</h1>

<div id="inventory"></div>

<h1>Orders Needed</h1>

<div id="orders"></div>

<script>

fetch('inventory.json')
.then(r => r.json())
.then(data => {

let html = "<table border='1'>";

html += `
<tr>
<th>Serial</th>
<th>Item</th>
<th>On Hand</th>
</tr>
`;

data.forEach(item => {

html += `
<tr>
<td>${item.Serial}</td>
<td>${item.Item}</td>
<td>${item["On Hand"]}</td>
</tr>
`;

});

html += "</table>";

document.getElementById(
"inventory"
).innerHTML = html;

});

fetch('orders.json')
.then(r => r.json())
.then(data => {

let html = "<table border='1'>";

html += `
<tr>
<th>Item</th>
<th>Order Qty</th>
</tr>
`;

data.forEach(item => {

html += `
<tr>
<td>${item.Item}</td>
<td>${item["Reorder Qty"]}</td>
</tr>
`;

});

html += "</table>";

document.getElementById(
"orders"
).innerHTML = html;

});

</script>

</body>
</html>
